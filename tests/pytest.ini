[tool:pytest]
# PyTest Configuration for Wolf AI 2.0 Testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires external services)
    slow: Slow running tests
    vision: Tests requiring vision components
    tts: Tests requiring TTS components
    memory: Tests requiring memory/database
    research: Tests requiring web access
    bugwatcher: Tests requiring OCR/screen capture

# Minimum version
minversion = 6.0

# Timeout for tests (in seconds)
timeout = 300

# Async test support
asyncio_mode = auto

# Test session configuration
console_output_style = progress
log_cli = false
log_cli_level = INFO

# Coverage configuration (if pytest-cov is installed)
# addopts = --cov=core --cov-report=html --cov-report=term-missing
